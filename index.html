<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Baby Trip Map</title>
    <meta
      name="description"
      content="A mobile-friendly vacation shortlist map for Cornwall, Devon, and nearby options."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button
        id="menu-toggle"
        class="menu-button"
        type="button"
        aria-expanded="false"
        aria-controls="menu-panel"
        aria-label="Open sightseeing guide"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <header class="hero-bar">
        <div>
          <p class="eyebrow">June 1 to June 8, 2026</p>
          <h1>Baby Trip Map</h1>
        </div>
      </header>
      <button id="reset-view" class="ghost-button reset-button" type="button">
        Reset Map
      </button>

      <main class="map-wrap">
        <div id="map" aria-label="Vacation map"></div>
      </main>
    </div>

    <aside id="menu-panel" class="menu-panel" aria-hidden="true">
      <div class="menu-scrim" data-close-menu="true"></div>
      <section class="menu-sheet">
        <div class="menu-head">
          <div>
            <p class="eyebrow">Sightseeing Guide</p>
            <h2>Explore the wider area</h2>
          </div>
          <button
            id="close-menu"
            class="menu-close"
            type="button"
            aria-label="Close sightseeing guide"
          >
            ×
          </button>
        </div>

        <div id="guide-list" class="guide-list"></div>
      </section>
    </aside>

    <aside
      id="detail-panel"
      class="detail-panel"
      aria-hidden="true"
      aria-label="Property details"
    >
      <div class="detail-scrim" data-close-detail="true"></div>
      <section class="detail-sheet">
        <button
          id="close-detail"
          class="close-detail"
          type="button"
          aria-label="Close home view"
        >
          ×
        </button>

        <div class="detail-media-wrap">
          <img id="detail-image" class="detail-image" alt="" />
          <div class="detail-badges">
            <span id="detail-platform" class="pill"></span>
            <a
              id="visit-link-top"
              class="pill pill-link"
              href="#"
              target="_blank"
              rel="noreferrer"
            >
              Visit host website
            </a>
          </div>
        </div>

        <div class="detail-content">
          <div class="detail-head">
            <div>
              <p id="detail-group" class="eyebrow"></p>
              <h2 id="detail-title"></h2>
              <p id="detail-area" class="detail-area"></p>
            </div>
            <div class="detail-top-actions">
              <button id="prev-home" class="nav-button" type="button">
                ← Previous
              </button>
              <button id="next-home" class="nav-button" type="button">
                Next →
              </button>
            </div>
          </div>

          <div class="detail-grid">
            <article class="detail-card">
              <h3>Address</h3>
              <p id="detail-address"></p>
              <p id="detail-confidence" class="muted"></p>
            </article>

            <article class="detail-card">
              <h3>Nearby Amenities</h3>
              <p id="detail-amenities"></p>
            </article>
          </div>
        </div>
      </section>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
